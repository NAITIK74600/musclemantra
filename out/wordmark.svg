<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" fill="none">
  <defs>
    <linearGradient id="mm-wm" x1="0" y1="0" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF8C3A"/>
      <stop offset="1" stop-color="#E55A00"/>
    </linearGradient>
  </defs>
  <!-- Badge -->
  <rect x="4" y="4" width="52" height="52" rx="12" fill="url(#mm-wm)"/>
  <!-- Mini dumbbell -->
  <g fill="#fff">
    <rect x="12" y="24" width="4" height="12" rx="1"/>
    <rect x="16" y="20" width="4" height="20" rx="1"/>
    <rect x="20" y="28" width="20" height="4" rx="1"/>
    <rect x="40" y="20" width="4" height="20" rx="1"/>
    <rect x="44" y="24" width="4" height="12" rx="1"/>
  </g>
  <!-- Wordmark -->
  <text x="70" y="28" font-family="Impact, 'Arial Black', sans-serif" font-size="22" font-weight="900" fill="#0a0a0a" letter-spacing="1">MUSCLE</text>
  <text x="70" y="50" font-family="Impact, 'Arial Black', sans-serif" font-size="22" font-weight="900" fill="#FF6B00" letter-spacing="1">MANTRA</text>
</svg>
